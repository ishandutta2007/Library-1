name: verify-and-docs

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      split-size: "5"
    steps:
      - uses: actions/checkout@v4

      - name: Generate test list per split
        run: |
          find test -name '*.test.cpp' | sort > all_tests.txt
          total=$(wc -l < all_tests.txt)
          split_size=5
          chunk=$(( (total + split_size - 1) / split_size ))
          echo "Total tests: ${total}, chunk size: ${chunk}"
          for i in $(seq 0 $((split_size - 1))); do
            start=$((i * chunk + 1))
            end=$(( (i + 1) * chunk ))
            sed -n "${start},${end}p" all_tests.txt > "split-${i}.txt"
            echo "Split ${i}: $(wc -l < split-${i}.txt) tests"
          done

      - name: Upload split lists
        uses: actions/upload-artifact@v4
        with:
          name: split-lists
          path: split-*.txt
          retention-days: 1

  download:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        split: [0, 1, 2, 3, 4]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download split list
        uses: actions/download-artifact@v4
        with:
          name: split-lists

      - name: Restore testcase cache
        uses: actions/cache/restore@v4
        id: restore-tc
        with:
          path: .cache/testcases
          key: testcases-split-${{ matrix.split }}-v1
          restore-keys: |
            testcases-split-${{ matrix.split }}-

      - name: Restore library-checker-problems
        uses: actions/cache/restore@v4
        id: restore-lc
        with:
          path: .cache/library-checker-problems
          key: library-checker-v1

      - name: Download tc.zip (manual testcases)
        run: |
          mkdir -p .cache/tc
          curl -L -o tc.zip https://github.com/hashiryo/Library/releases/download/v0.0.0/tc.zip || true
          if [ -f tc.zip ]; then
            unzip -q tc.zip -d .cache/tc
            rm tc.zip
          fi

      - name: Download cached testcases from Releases
        run: |
          mkdir -p .cache/tc-downloaded
          for service in aoj yukicoder hackerrank; do
            url="https://github.com/${{ github.repository }}/releases/download/testcases/tc-${service}.zip"
            if curl -fsSL -o "tc-${service}.zip" "${url}" 2>/dev/null; then
              unzip -q "tc-${service}.zip" -d ".cache/tc-downloaded/${service}"
              rm "tc-${service}.zip"
              echo "Restored tc-${service}.zip"
            fi
          done

      - name: Download testcases for this split
        env:
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/download-testcases.py --split split-${{ matrix.split }}.txt

      - name: Save testcase cache
        uses: actions/cache/save@v4
        with:
          path: .cache/testcases
          key: testcases-split-${{ matrix.split }}-v1

      - name: Save library-checker-problems cache
        uses: actions/cache/save@v4
        if: steps.restore-lc.outputs.cache-hit != 'true' && matrix.split == 0
        with:
          path: .cache/library-checker-problems
          key: library-checker-v1

      - name: Upload testcases
        uses: actions/upload-artifact@v4
        with:
          name: testcases-${{ matrix.split }}
          path: .cache/testcases
          retention-days: 1
          compression-level: 1

  verify:
    needs: download
    strategy:
      fail-fast: false
      matrix:
        env:
          - { os: ubuntu-24.04,     cxx: g++-13,     name: x64-g++ }
          - { os: ubuntu-24.04,     cxx: clang++-18,  name: x64-clang++ }
          - { os: ubuntu-24.04-arm, cxx: g++-13,     name: arm-g++ }
          - { os: ubuntu-24.04-arm, cxx: clang++-18,  name: arm-clang++ }
        split: [0, 1, 2, 3, 4]
    runs-on: ${{ matrix.env.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download split list
        uses: actions/download-artifact@v4
        with:
          name: split-lists

      - name: Download testcases
        uses: actions/download-artifact@v4
        with:
          name: testcases-${{ matrix.split }}
          path: .cache/testcases

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore previous results
        uses: actions/cache/restore@v4
        id: restore-prev
        with:
          path: .cache/results/result-${{ matrix.env.name }}-${{ matrix.split }}.json
          key: verify-${{ matrix.env.name }}-${{ matrix.split }}-${{ github.sha }}
          restore-keys: |
            verify-${{ matrix.env.name }}-${{ matrix.split }}-

      - name: Run tests
        env:
          CXX: ${{ matrix.env.cxx }}
          CXXFLAGS: "-std=c++17 -Wall -Wextra -O2"
          ENV_NAME: ${{ matrix.env.name }}
          PREV_RESULT: ${{ steps.restore-prev.outputs.cache-hit && format('.cache/results/result-{0}-{1}.json', matrix.env.name, matrix.split) || '' }}
        run: |
          bash scripts/run-tests.sh \
            --split-file split-${{ matrix.split }}.txt

      - name: Save results cache
        uses: actions/cache/save@v4
        with:
          path: .cache/results/result-${{ matrix.env.name }}-${{ matrix.split }}.json
          key: verify-${{ matrix.env.name }}-${{ matrix.split }}-${{ github.sha }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.env.name }}-${{ matrix.split }}
          path: .cache/results/result-${{ matrix.env.name }}.json
          retention-days: 7

  docs:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: .cache/results/
          merge-multiple: true

      - name: Merge results
        run: npx tsx scripts/merge-results.ts

      - name: Write summary
        run: npx tsx scripts/write-summary.ts >> "$GITHUB_STEP_SUMMARY"

      - name: Build VitePress site
        run: npm run docs:build

      - name: Setup Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
