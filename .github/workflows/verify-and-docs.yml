name: verify-and-docs

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cxx: g++-13
            env_name: x64-g++
            cxxflags: "-std=c++17 -Wall -Wextra -O2"
          - os: ubuntu-24.04
            cxx: clang++-18
            env_name: x64-clang++
            cxxflags: "-std=c++17 -Wall -Wextra -O2"
          - os: ubuntu-24.04-arm
            cxx: g++-13
            env_name: arm-g++
            cxxflags: "-std=c++17 -Wall -Wextra -O2"
          - os: ubuntu-24.04-arm
            cxx: clang++-18
            env_name: arm-clang++
            cxxflags: "-std=c++17 -Wall -Wextra -O2"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install oj
        run: pip install online-judge-tools

      - name: Restore previous results
        uses: actions/cache/restore@v4
        id: restore-prev
        with:
          path: .cache/results/result-${{ matrix.env_name }}.json
          key: verify-${{ matrix.env_name }}-${{ github.sha }}
          restore-keys: |
            verify-${{ matrix.env_name }}-

      - name: Download tc.zip
        run: |
          mkdir -p .cache/tc
          curl -L -o tc.zip https://github.com/hashiryo/Library/releases/download/v0.0.0/tc.zip || true
          if [ -f tc.zip ]; then
            unzip -q tc.zip -d .cache/tc
            rm tc.zip
          fi

      - name: Run tests
        env:
          CXX: ${{ matrix.cxx }}
          CXXFLAGS: ${{ matrix.cxxflags }}
          ENV_NAME: ${{ matrix.env_name }}
          PREV_RESULT: ${{ steps.restore-prev.outputs.cache-hit && format('.cache/results/result-{0}.json', matrix.env_name) || '' }}
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
        run: bash scripts/run-tests.sh

      - name: Save results cache
        uses: actions/cache/save@v4
        with:
          path: .cache/results/result-${{ matrix.env_name }}.json
          key: verify-${{ matrix.env_name }}-${{ github.sha }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.env_name }}
          path: .cache/results/result-${{ matrix.env_name }}.json
          retention-days: 7

  docs:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: .cache/results/
          merge-multiple: true

      - name: Merge results
        run: npx tsx scripts/merge-results.ts

      - name: Build VitePress site
        run: npm run docs:build

      - name: Setup Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
