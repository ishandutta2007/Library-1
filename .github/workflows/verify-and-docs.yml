name: verify-and-docs

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore testcase cache
        uses: actions/cache/restore@v4
        id: restore-tc
        with:
          path: .cache/testcases
          key: testcases-v3
          restore-keys: |
            testcases-

      - name: Restore library-checker-problems cache
        uses: actions/cache/restore@v4
        id: restore-lc
        with:
          path: .cache/library-checker-problems
          key: library-checker-v1
          restore-keys: |
            library-checker-

      - name: Download tc.zip (manual testcases)
        run: |
          mkdir -p .cache/tc
          curl -L -o tc.zip https://github.com/hashiryo/Library/releases/download/v0.0.0/tc.zip || true
          if [ -f tc.zip ]; then
            unzip -q tc.zip -d .cache/tc
            rm tc.zip
          fi

      - name: Download cached testcases from Releases
        run: |
          mkdir -p .cache/tc-downloaded
          for service in aoj yukicoder hackerrank other; do
            url="https://github.com/${{ github.repository }}/releases/download/testcases/tc-${service}.zip"
            if curl -fsSL -o "tc-${service}.zip" "${url}" 2>/dev/null; then
              unzip -q "tc-${service}.zip" -d ".cache/tc-downloaded/${service}"
              rm "tc-${service}.zip"
              echo "Restored tc-${service}.zip"
            fi
          done

      - name: Download all testcases
        env:
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
        run: python3 scripts/download-testcases.py

      - name: Save testcase cache
        uses: actions/cache/save@v4
        with:
          path: .cache/testcases
          key: testcases-v3

      - name: Save library-checker-problems cache
        uses: actions/cache/save@v4
        if: steps.restore-lc.outputs.cache-hit != 'true'
        with:
          path: .cache/library-checker-problems
          key: library-checker-v1

      - name: Save downloaded testcases to Releases
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/save-downloaded-testcases.sh

      - name: Upload testcases artifact
        uses: actions/upload-artifact@v4
        with:
          name: testcases
          path: .cache/testcases
          retention-days: 1
          compression-level: 1

  verify:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        env:
          - { os: ubuntu-24.04,     cxx: g++-13,    name: x64-g++ }
          - { os: ubuntu-24.04,     cxx: clang++-18, name: x64-clang++ }
          - { os: ubuntu-24.04-arm, cxx: g++-13,    name: arm-g++ }
          - { os: ubuntu-24.04-arm, cxx: clang++-18, name: arm-clang++ }
        split: [0, 1, 2, 3, 4]
    runs-on: ${{ matrix.env.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download testcases
        uses: actions/download-artifact@v4
        with:
          name: testcases
          path: .cache/testcases

      - name: Restore previous results
        uses: actions/cache/restore@v4
        id: restore-prev
        with:
          path: .cache/results/result-${{ matrix.env.name }}-${{ matrix.split }}.json
          key: verify-${{ matrix.env.name }}-${{ matrix.split }}-${{ github.sha }}
          restore-keys: |
            verify-${{ matrix.env.name }}-${{ matrix.split }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        env:
          CXX: ${{ matrix.env.cxx }}
          CXXFLAGS: "-std=c++17 -Wall -Wextra -O2"
          ENV_NAME: ${{ matrix.env.name }}
          PREV_RESULT: ${{ steps.restore-prev.outputs.cache-hit && format('.cache/results/result-{0}-{1}.json', matrix.env.name, matrix.split) || '' }}
        run: bash scripts/run-tests.sh --split-index ${{ matrix.split }} --split-size 5

      - name: Save results cache
        uses: actions/cache/save@v4
        with:
          path: .cache/results/result-${{ matrix.env.name }}.json
          key: verify-${{ matrix.env.name }}-${{ matrix.split }}-${{ github.sha }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.env.name }}-${{ matrix.split }}
          path: .cache/results/result-${{ matrix.env.name }}.json
          retention-days: 7

  docs:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: .cache/results/
          merge-multiple: true

      - name: Merge results
        run: npx tsx scripts/merge-results.ts

      - name: Write summary
        run: npx tsx scripts/write-summary.ts >> "$GITHUB_STEP_SUMMARY"

      - name: Build VitePress site
        run: npm run docs:build

      - name: Setup Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
