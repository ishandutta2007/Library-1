name: verify-and-docs

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.verify-results/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      has-tests: ${{ steps.split.outputs.has-tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine tests to run
        id: split
        run: |
          prev=".verify-results/results.json"
          need_rerun_all=""
          if [ -f "${prev}" ]; then
            for env in x64-g++ x64-clang++ arm-g++ arm-clang++; do
              tests=$(python3 scripts/check-need-rerun.py \
                --prev-result "${prev}" \
                --env "${env}" \
                --all 2>/dev/null | grep -v '^#')
              need_rerun_all=$(printf "%s\n%s" "${need_rerun_all}" "${tests}")
            done
          else
            # 前回結果なし → IGNORE 以外の全テスト
            need_rerun_all=$(grep -rL 'competitive-verifier:.*IGNORE' test --include='*.test.cpp' | sort)
          fi

          echo "${need_rerun_all}" | grep -v '^$' | sort -u > need_rerun.txt
          total=$(wc -l < need_rerun.txt | tr -d ' ')
          echo "Tests needing re-run: ${total}"

          if [ "${total}" -eq 0 ]; then
            echo "has-tests=false" >> "$GITHUB_OUTPUT"
            for i in $(seq 0 9); do touch "split-${i}.txt"; done
          else
            echo "has-tests=true" >> "$GITHUB_OUTPUT"
            split_size=10
            chunk=$(( (total + split_size - 1) / split_size ))
            for i in $(seq 0 $((split_size - 1))); do
              start=$((i * chunk + 1))
              end=$(( (i + 1) * chunk ))
              sed -n "${start},${end}p" need_rerun.txt > "split-${i}.txt"
              count=$(wc -l < "split-${i}.txt" | tr -d ' ')
              echo "  Split ${i}: ${count} tests"
            done
          fi

      - name: Upload split lists
        uses: actions/upload-artifact@v4
        with:
          name: split-lists
          path: split-*.txt
          retention-days: 1

  split-0:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 0
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-1:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 1
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-2:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 2
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-3:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 3
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-4:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 4
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-5:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 5
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-6:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 6
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-7:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 7
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-8:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 8
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  split-9:
    needs: setup
    if: needs.setup.outputs.has-tests == 'true'
    uses: ./.github/workflows/verify-split.yml
    with:
      split: 9
    secrets:
      YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}

  docs:
    needs: [setup, split-0, split-1, split-2, split-3, split-4, split-5, split-6, split-7, split-8, split-9]
    if: "!cancelled() && needs.setup.result == 'success'"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all results
        if: needs.setup.outputs.has-tests == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: .cache/results/
          merge-multiple: true

      - name: Merge results
        run: |
          mkdir -p .verify-results md/public
          if [ -d ".cache/results" ] && ls .cache/results/result-*.json 1>/dev/null 2>&1; then
            npx tsx scripts/merge-results.ts --prev .verify-results/results.json
          elif [ -f ".verify-results/results.json" ]; then
            cp .verify-results/results.json md/public/results.json
          fi

      - name: Commit results
        if: github.ref == 'refs/heads/master' && needs.setup.outputs.has-tests == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .verify-results/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[skip ci] Update verify results"
            git push
            echo "Results committed"
          fi

      - name: Write summary
        run: npx tsx scripts/write-summary.ts >> "$GITHUB_STEP_SUMMARY" || true

      - name: Build VitePress site
        run: npm run docs:build

      - name: Setup Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
